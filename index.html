<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webinar-Anmeldungen · Dashboard</title>
<style>
  :root{--bg:#f6f7f9;--card:#fff;--line:#e6e8eb;--text:#1a1d21;--muted:#6b7280;--accent:#378ADD;--accent-soft:#e6f1fb;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--line);flex-wrap:wrap;gap:12px;}
  h1{font-size:18px;font-weight:600;margin:0;}
  .wrap{max-width:920px;margin:0 auto;padding:24px;}
  .muted{color:var(--muted);}
  button{font:inherit;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:9px 16px;cursor:pointer;}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button:hover{filter:brightness(.97);}
  select{font:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);max-width:340px;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:20px 0;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;}
  .stat .label{font-size:13px;color:var(--muted);margin-bottom:6px;}
  .stat .val{font-size:26px;font-weight:600;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;margin-top:16px;}
  .login{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;}
  .hidden{display:none;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:500;}
</style>
</head>
<body>
<div id="login" class="login">
  <h1>Webinar-Anmeldungen</h1>
  <p class="muted">Melde dich mit deinem Microsoft-Konto an, um deine Anmeldezahlen zu sehen.</p>
  <button class="primary" id="btn-login">Mit Microsoft anmelden</button>
  <p class="muted" id="login-err" style="color:#c0392b;"></p>
</div>

<div id="app" class="hidden">
  <header>
    <h1>Webinar-Anmeldungen</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="avatar" id="avatar">–</div>
      <span class="muted" id="who"></span>
      <button id="btn-logout">Abmelden</button>
    </div>
  </header>
  <div class="wrap">
    <select id="webinar"></select>
    <div class="cards">
      <div class="stat"><div class="label">Deine Anmeldungen</div><div class="val" id="s-mine">–</div></div>
      <div class="stat"><div class="label">Anmeldungen gesamt</div><div class="val" id="s-total">–</div></div>
      <div class="stat"><div class="label">Dein Anteil</div><div class="val" id="s-share">–</div></div>
      <div class="stat"><div class="label">Dein Rang im Team</div><div class="val" id="s-rank">–</div></div>
    </div>
    <div class="panel">
      <div class="muted" style="margin-bottom:10px;">Anmeldungen pro Berater</div>
      <div style="position:relative;height:280px;"><canvas id="chart"></canvas></div>
    </div>
    <div class="panel">
      <div class="muted" style="margin-bottom:10px;">Deine Anmeldungen (Teilnehmer)</div>
      <table><thead><tr><th>Teilnehmer</th><th>E-Mail</th><th>Angemeldet am</th></tr></thead>
      <tbody id="mytbl"><tr><td colspan="3" class="muted">–</td></tr></tbody></table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const SUPABASE_URL = "https://umgbtymowqavnmsbgceh.supabase.co";
const SUPABASE_KEY = "sb_publishable_uwCtealR7TogA86X68-RZg_3FQ1RPT0";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);
let chart, me = "";

$("btn-login").onclick = async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: "azure",
    options: { scopes: "openid email profile", redirectTo: window.location.origin + window.location.pathname },
  });
  if (error) $("login-err").textContent = error.message;
};
$("btn-logout").onclick = async () => { await sb.auth.signOut(); location.reload(); };

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { $("login").classList.remove("hidden"); $("app").classList.add("hidden"); return; }
  $("login").classList.add("hidden"); $("app").classList.remove("hidden");
  me = (session.user.email || "").toLowerCase();
  const name = session.user.user_metadata?.full_name || session.user.email || "";
  $("who").textContent = name;
  $("avatar").textContent = name.split(" ").map(s => s[0]).slice(0,2).join("").toUpperCase();
  await loadData();
}

let totals = [], counts = [], mine = [];
async function loadData() {
  const [t, c, m] = await Promise.all([
    sb.rpc("webinar_totals"),
    sb.rpc("webinar_advisor_counts"),
    sb.rpc("webinar_my_registrations"),
  ]);
  totals = t.data || []; counts = c.data || []; mine = m.data || [];
  const sel = $("webinar"); sel.innerHTML = "";
  if (!totals.length) { sel.innerHTML = "<option>Noch keine Webinare synchronisiert</option>"; return; }
  totals.forEach(w => {
    const o = document.createElement("option");
    o.value = w.webinar_id;
    o.textContent = w.title + (w.starts_at ? " · " + new Date(w.starts_at).toLocaleDateString("de-DE") : "");
    sel.appendChild(o);
  });
  sel.onchange = () => render(sel.value);
  render(totals[0].webinar_id);
}

function render(wid) {
  const total = totals.find(w => w.webinar_id === wid)?.total_registrations || 0;
  const rows = counts.filter(c => c.webinar_id === wid).sort((a,b) => b.registrations - a.registrations);
  const mineRow = counts.find(c => c.webinar_id === wid && (c.email||"").toLowerCase() === me);
  const mineCount = mineRow ? Number(mineRow.registrations) : 0;
  const rank = mineRow ? rows.findIndex(r => r.advisor_id === mineRow.advisor_id) + 1 : "–";
  $("s-mine").textContent = mineCount;
  $("s-total").textContent = total;
  $("s-share").textContent = total ? Math.round(mineCount/total*100) + " %" : "–";
  $("s-rank").textContent = mineRow ? rank + " / " + rows.length : "–";

  const labels = rows.map(r => r.advisor_name);
  const data = rows.map(r => Number(r.registrations));
  const colors = rows.map(r => (r.email||"").toLowerCase() === me ? "#378ADD" : "#b4b2a9");
  if (chart) chart.destroy();
  chart = new Chart($("chart"), {
    type: "bar",
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4 }] },
    options: { indexAxis: "y", responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { precision: 0 } } } },
  });

  const tbl = $("mytbl");
  const myRows = mine.filter(r => r.webinar_id === wid);
  tbl.innerHTML = myRows.length ? myRows.map(r =>
    `<tr><td>${r.attendee_name||"–"}</td><td>${r.attendee_email||"–"}</td><td>${r.registered_at ? new Date(r.registered_at).toLocaleString("de-DE") : "–"}</td></tr>`
  ).join("") : '<tr><td colspan="3" class="muted">Keine eigenen Anmeldungen für dieses Webinar.</td></tr>';
}

sb.auth.onAuthStateChange(() => init());
init();
</script>
</body>
</html>
