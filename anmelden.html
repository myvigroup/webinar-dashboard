async function init(){
  if(!slug){ $("view").innerHTML='<div class="msg err" style="display:block">Dieser Link ist unvollständig. Bitte nutze den persönlichen Link deines Beraters.</div>'; return; }
  const [{data:adv},{data:w}]=await Promise.all([sb.rpc("webinar_advisor_by_slug",{p_slug:slug}),sb.rpc("webinar_public_upcoming")]);
  advisor=adv&&adv[0]; webs=w||[];
  if(advisor){ $("invite").classList.remove("hidden"); $("invite").innerHTML=avatar(advisor.name,null,"av")+'<div>Du wurdest von <b>'+esc(advisor.name)+'</b> zu unseren kostenlosen Live-Workshops eingeladen.</div>'; }
  render();
}
function topicsWithDates(){
  const map={};
  webs.forEach(wb=>{ const t=topicOf(wb.title); if(!t) return; (map[t.key]=map[t.key]||[]).push(wb); });
  return TOPICS.filter(t=>map[t.key]).map(t=>({...t,dates:map[t.key].sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at))}));
}
function presentersOf(dates){
  const seen={}, out=[];
  dates.forEach(d=>{ const p=(d.presenter||"").trim(); if(p && !seen[p]){ seen[p]=1; out.push({name:p,avatar:d.presenter_avatar}); } });
  return out;
}
function render(){

}

    const next=t.dates[0]; const ps=presentersOf(t.dates); const p=ps[0];
    const refline=p?('<div class="tref">'+avatar(p.name,p.avatar,"av")+'<span>mit '+esc(p.name)+(ps.length>1?' u. a.':'')+'</span></div>'):'';
    return '<a class="tcard" href="?b='+encodeURIComponent(slug)+'&t='+t.key+'">'
      +'<div class="ticon">'+ic(t.icon)+'</div>'
      +'<h3>'+esc(t.label)+'</h3>'
      +'<p>'+esc(t.sub)+'</p>'
      +'<div class="tmeta">Kostenlos<span class="dot"></span>60 Min<span class="dot"></span>Live</div>'
      +'<div class="tpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="lbl">Nächster Termin:</span> <span class="dt">'+fmtFull(next.starts_at)+'</span></div>'
      +refline
      +'<div class="go">Ansehen &amp; anmelden →</div></a>';
  }).join("");
  $("view").innerHTML='<h2 class="sec">Unsere kostenlosen Live-Workshops</h2><p class="lead">Wähle dein Thema – kompakt, praxisnah und live mit unseren Experten.</p><div class="grid">'+cards+'</div>';
}
function renderTopic(t){
  const dates=t.dates.map(wb=>'<div class="date" data-w="'+wb.webinar_id+'"><div class="dbox"><div class="d">'+fmtDay(wb.starts_at)+'</div><div class="m">'+fmtMon(wb.starts_at)+'</div></div><div class="dmeta"><b>'+fmtFull(wb.starts_at)+'</b><span>Online via Microsoft Teams</span></div><div class="radio"></div></div>').join("");
  const ben=t.benefits.map(b=>'<li>'+ic("check")+esc(b)+'</li>').join("");
  const pains=t.pains.map(p=>'<li>'+ic("minus")+esc(p)+'</li>').join("");
  const ps=presentersOf(t.dates);
  let refHtml="";
  if(ps.length){
    const rows=ps.map(p=>'<div class="refrow">'+avatar(p.name,p.avatar,"refav")+'<div><div class="refname">'+esc(p.name)+'</div><div class="refrole">mitNORM · Experte für '+esc(t.label)+'</div></div></div>').join("");
    const names=ps.map(p=>p.name).join(" & ");
    const bio=ps.length===1
      ? esc(names)+' ist Teil des mitNORM-Expertenteams und führt dich im Live-Workshop praxisnah durch das Thema – verständlich, ehrlich und mit Raum für deine Fragen.'
      : 'Unsere mitNORM-Experten '+esc(names)+' führen dich praxisnah durch den Live-Workshop – verständlich, ehrlich und mit Raum für deine Fragen.';
    refHtml='<div class="ref"><h3>'+(ps.length>1?'Deine Referenten':'Dein Referent')+'</h3>'+rows+'<p class="refbio">'+bio+'</p></div>';
  }
  $("view").innerHTML=
    '<a class="back" href="?b='+encodeURIComponent(slug)+'">'+ic("arrow")+' Alle Themen</a>'+
    '<div class="hero"><div class="tag">'+ic(t.icon)+' '+esc(t.label)+'</div><h1>'+esc(t.headline)+'</h1><p>'+esc(t.sub)+'</p></div>'+
    '<div class="badges"><div class="badge free">'+ic("check")+' 100 % kostenlos</div><div class="badge">'+ic("clock")+' ca. 60 Minuten</div><div class="badge">'+ic("monitor")+' Live online</div><div class="badge">'+ic("chat")+' Fragen willkommen</div></div>'+
    '<div class="problem"><h3>Kommt dir das bekannt vor?</h3><p>'+esc(t.problem)+'</p><ul class="pains">'+pains+'</ul></div>'+
    refHtml+
    '<div class="cols">'+
      '<div class="panel"><h3>Das nimmst du mit</h3><ul class="ben">'+ben+'</ul></div>'+
      '<div class="panel"><h3>Termin wählen &amp; anmelden</h3><div class="dates">'+dates+'</div>'+
        '<div class="frow"><div><label>Vorname</label><input id="vorname" autocomplete="given-name"></div><div><label>Nachname</label><input id="nachname" autocomplete="family-name"></div></div>'+
        '<label>E-Mail</label><input id="email" type="email" autocomplete="email">'+
        '<div class="guests" id="guests"></div>'+
        '<button type="button" class="addbtn" id="addguest">'+ic("plus")+' Freund:in mitbringen</button>'+
        '<p class="hint">Bring gerne Freunde mit! Wir laden sie direkt mit ein – bitte nur mit deren Einverständnis.</p>'+
        '<label class="consent"><input id="consent" type="checkbox"> <span>Ich bin mit der Verarbeitung der angegebenen Daten zur Webinar-Anmeldung einverstanden (<a href="https://www.mitnorm.com/datenschutz" target="_blank" rel="noopener">Datenschutz</a>).</span></label>'+
        '<button class="cta" id="submit">Kostenlos anmelden</button><div id="msg" class="msg"></div>'+
      '</div>'+
    '</div>';
  selectedW = t.dates.length===1 ? t.dates[0].webinar_id : "";
  guestCount=0;
  document.querySelectorAll(".date").forEach(el=>{ if(el.dataset.w===selectedW) el.classList.add("sel"); el.onclick=()=>{ document.querySelectorAll(".date").forEach(x=>x.classList.remove("sel")); el.classList.add("sel"); selectedW=el.dataset.w; }; });
  $("addguest").onclick=addGuest;
  $("submit").onclick=()=>submit(t);
}
function addGuest(){
  if(guestCount>=5) return;
  guestCount++;
  const div=document.createElement("div");
  div.className="guestrow";
  div.innerHTML='<span class="rm">entfernen ✕</span><div class="frow"><div><label>Vorname (Freund:in)</label><input class="g-vn"></div><div><label>Nachname</label><input class="g-nn"></div></div><label>E-Mail</label><input class="g-em" type="email">';
  $("guests").appendChild(div);
  div.querySelector(".rm").onclick=()=>div.remove();
  if(guestCount>=5) $("addguest").style.display="none";
}
async function regOne(p){ try{ const {data,error}=await sb.functions.invoke("webinar-register",{body:p}); return !error && data && data.ok!==false; }catch(_){ return false; } }
async function submit(t){
  const m=$("msg"); const err=(x)=>{m.className="msg err";m.style.display="block";m.textContent=x;};
  const main={b:slug,w:selectedW,vorname:$("vorname").value.trim(),nachname:$("nachname").value.trim(),email:$("email").value.trim(),consent:$("consent").checked};
  if(!main.w) return err("Bitte wähle einen Termin aus.");
  if(!main.vorname||!main.nachname||!main.email) return err("Bitte fülle deine Felder aus.");
  if(!main.consent) return err("Bitte stimme der Datenverarbeitung zu.");
  const guests=[];
  document.querySelectorAll(".guestrow").forEach(r=>{ const vn=r.querySelector(".g-vn").value.trim(),nn=r.querySelector(".g-nn").value.trim(),em=r.querySelector(".g-em").value.trim(); if(vn&&nn&&em) guests.push({b:slug,w:selectedW,vorname:vn,nachname:nn,email:em,consent:true}); });
  $("submit").disabled=true;$("submit").textContent="Wird angemeldet…";m.style.display="none";
  const okMain=await regOne(main);
  if(!okMain){ err("Anmeldung fehlgeschlagen. Bitte prüfe deine E-Mail-Adresse oder versuche es später erneut."); $("submit").disabled=false;$("submit").textContent="Kostenlos anmelden"; return; }
  let g=0; for(const gu of guests){ if(await regOne(gu)) g++; }
  const shareUrl=location.origin+location.pathname+"?b="+encodeURIComponent(slug)+"&t="+t.key;
  const waText=encodeURIComponent("Schau dir diesen kostenlosen Live-Workshop von mitNORM an: "+t.label+" → "+shareUrl);
  document.querySelector(".cols").innerHTML=
    '<div class="panel" style="grid-column:1/-1;text-align:center;padding:36px 24px;">'+
      '<div class="bigcheck" style="display:flex;justify-content:center;margin-bottom:6px;color:#1a7d4b;">'+ic("checkcircle")+'</div>'+
      '<h3 style="font-size:22px;margin:6px 0;">'+(g>0?("Ihr seid angemeldet! ("+(g+1)+" Personen)"):"Anmeldung erfolgreich!")+'</h3>'+
      '<p style="color:var(--muted);margin:0 auto;max-width:460px;">Ihr erhaltet die Zugangsdaten in Kürze per E-Mail von Microsoft Teams. Wir freuen uns auf euch!</p>'+
      '<div class="share" style="text-align:left;max-width:460px;margin:18px auto 0;">'+
        '<h4>'+ic("share")+' Kennst du jemanden, den das interessiert?</h4>'+
        '<div style="font-size:14px;color:var(--muted);">Teile den Workshop mit Freunden – sie können sich direkt mit anmelden.</div>'+
        '<div class="sharebtns"><a class="sbtn wa" href="https://wa.me/?text='+waText+'" target="_blank" rel="noopener">Per WhatsApp teilen</a><button class="sbtn" id="copylink">Link kopieren</button></div>'+
      '</div>'+
    '</div>';
  const cb=$("copylink"); if(cb) cb.onclick=()=>{ navigator.clipboard.writeText(shareUrl).then(()=>{ cb.textContent="Link kopiert ✓"; }); };
}
window.addEventListener("popstate",()=>{ curTopic=new URLSearchParams(location.search).get("t")||""; render(); });
init();
</script>
