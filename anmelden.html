<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live-Workshops · mitNORM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#004283;--navy2:#013a73;--cyan:#06BADD;--bg:#eef3f8;--line:#e4eaf1;--muted:#5b7088;--text:#0b2138;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;}
  a{color:var(--navy);}
  .top{background:#fff;border-bottom:1px solid var(--line);}
  .top .in{max-width:980px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--cyan));}
  .logo-t{font-family:Outfit,sans-serif;font-weight:800;color:var(--navy);font-size:16px;}
  .wrap{max-width:980px;margin:0 auto;padding:22px 20px 60px;}
  .invite{background:#eef7fb;border:1px solid #cdeaf3;border-radius:12px;padding:12px 16px;font-size:14px;margin-bottom:22px;display:flex;align-items:center;gap:10px;}
  .av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto;}
  .invite b{color:var(--navy);}
  /* Topic grid */
  h2.sec{font-family:Outfit,sans-serif;font-size:24px;color:var(--navy);margin:6px 0 4px;font-weight:800;}
  .lead{color:var(--muted);margin:0 0 22px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit;display:flex;flex-direction:column;box-shadow:0 4px 16px rgba(0,40,80,.04);}
  .tcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,40,80,.10);border-color:#cdeaf3;}
  .ticon{width:46px;height:46px;border-radius:12px;background:#eef7fb;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;}
  .tcard h3{font-family:Outfit,sans-serif;font-size:18px;margin:0 0 6px;color:var(--navy);font-weight:700;}
  .tcard p{margin:0 0 14px;color:var(--muted);font-size:14px;flex:1;}
  .tnext{font-size:13px;color:var(--text);font-weight:600;}
  .tnext span{color:var(--cyan);}
  .go{margin-top:14px;color:var(--navy);font-weight:700;font-size:14px;}
  /* Hero (topic) */
  .hero{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:18px;padding:32px;color:#fff;margin-bottom:24px;}
  .hero .tag{color:var(--cyan);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .hero h1{font-family:Outfit,sans-serif;font-size:30px;line-height:1.15;margin:8px 0 10px;font-weight:800;}
  .hero p{margin:0;color:#cfe0f0;font-size:16px;max-width:640px;}
  .cols{display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:start;}
  @media(max-width:820px){.cols{grid-template-columns:1fr;}.hero h1{font-size:25px;}}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 4px 16px rgba(0,40,80,.04);}
  .panel h3{font-family:Outfit,sans-serif;color:var(--navy);font-size:18px;margin:0 0 14px;font-weight:700;}
  .ben{list-style:none;padding:0;margin:0;}
  .ben li{position:relative;padding:8px 0 8px 30px;border-bottom:1px solid var(--line);font-size:15px;}
  .ben li:last-child{border-bottom:none;}
  .ben li::before{content:"✓";position:absolute;left:0;top:8px;width:20px;height:20px;background:#eafaff;color:var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
  .back{display:inline-block;margin-bottom:14px;color:var(--muted);text-decoration:none;font-size:14px;}
  .back:hover{color:var(--navy);}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 4px;font-weight:500;}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font:inherit;}
  input:focus{outline:none;border-color:var(--cyan);}
  .frow{display:flex;gap:10px;}.frow>div{flex:1;}
  .dates{display:flex;flex-direction:column;gap:10px;margin:4px 0 4px;}
  .date{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.12s;}
  .date:hover{border-color:#cdeaf3;}
  .date.sel{border-color:var(--cyan);background:#f3fbfe;}
  .dbox{flex:0 0 auto;width:52px;height:52px;border-radius:10px;background:var(--navy);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
  .dbox .d{font-size:20px;font-weight:800;font-family:Outfit,sans-serif;}
  .dbox .m{font-size:11px;text-transform:uppercase;margin-top:2px;}
  .dmeta{font-size:14px;}.dmeta b{display:block;}
  .dmeta span{color:var(--muted);font-size:13px;}
  .radio{margin-left:auto;width:20px;height:20px;border:2px solid var(--line);border-radius:50%;flex:0 0 auto;}
  .date.sel .radio{border-color:var(--cyan);background:radial-gradient(circle,var(--cyan) 0 6px,#fff 7px);}
  .consent{display:flex;gap:8px;align-items:flex-start;margin:14px 0;font-size:12.5px;color:var(--muted);}
  .consent input{width:auto;margin-top:2px;}
  button{width:100%;margin-top:6px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;}
  button:disabled{opacity:.6;cursor:not-allowed;}button:hover:not(:disabled){background:var(--navy2);}
  .msg{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;display:none;}
  .ok{background:#eaf7ef;border:1px solid #bfe6cc;color:#1a7d4b;}
  .err{background:#fdf0ee;border:1px solid #f3cfc8;color:#b03a3a;}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="top"><div class="in"><div class="logo"></div><div class="logo-t">mitNORM · Live-Workshops</div></div></div>
<div class="wrap">
  <div id="invite" class="invite hidden"></div>
  <div id="view"></div>
  <div class="foot">mitNORM GmbH · Bei Fragen: service@mitnorm.com · <a href="https://www.mitnorm.com/datenschutz" target="_blank" rel="noopener">Datenschutz</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://umgbtymowqavnmsbgceh.supabase.co";
const SUPABASE_KEY="sb_publishable_uwCtealR7TogA86X68-RZg_3FQ1RPT0";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=(id)=>document.getElementById(id);
const TZ="UTC";
const params=new URLSearchParams(location.search);
const slug=(params.get("b")||"").trim();
let curTopic=(params.get("t")||"").trim();

const TOPICS=[
 {key:"immobilie",match:/immobilie als kapitalanlage/i,label:"Immobilie als Kapitalanlage",icon:"🏠",
  headline:"Mit Immobilien clever Vermögen aufbauen",
  sub:"Warum sich ein Immobilien-Investment lohnen kann – und worauf es bei Lage, Finanzierung und Steuer wirklich ankommt.",
  benefits:["Immobilien als Baustein für den Vermögensaufbau","Worauf es bei Lage, Finanzierung & Steuer ankommt","Typische Fehler beim ersten Objekt vermeiden","Realistische Einschätzung: Chancen & Risiken"]},
 {key:"ruhestand",match:/ruhestandsplaner/i,label:"Ruhestandsplanung",icon:"🌅",
  headline:"Heute planen, später entspannt leben",
  sub:"So findest du heraus, wie viel du für deinen Ruhestand wirklich brauchst – und wie du die Versorgungslücke schließt.",
  benefits:["Wie viel du wirklich für später brauchst","Versorgungslücke erkennen und schließen","Die Bausteine der privaten Altersvorsorge","Konkrete nächste Schritte für deine Planung"]},
 {key:"baufi",match:/baufinanzierung/i,label:"Baufinanzierung",icon:"🔑",
  headline:"Deine Traumimmobilie sicher finanzieren",
  sub:"Zins, Tilgung, Förderung – verständlich erklärt, damit du deine Finanzierung solide und planbar aufstellst.",
  benefits:["Wie du deine Wunschimmobilie solide finanzierst","Zins, Tilgung & Laufzeit verständlich erklärt","Wie viel Haus du dir leisten kannst","Fördermöglichkeiten clever nutzen"]},
 {key:"riester",match:/riester|altersvorsorgedepot/i,label:"Riester & Altersvorsorge",icon:"📜",
  headline:"Riester-Reform 2026: Sichern, wechseln oder warten?",
  sub:"Was die Reform für dich bedeutet und welche Altersvorsorge sich jetzt wirklich für dich lohnt.",
  benefits:["Was die Reform 2026 für dich bedeutet","Riester behalten, wechseln oder kündigen?","Das Altersvorsorgedepot als Alternative","Was sich jetzt konkret für dich lohnt"]},
 {key:"steuern",match:/steuern sparen/i,label:"Steuern sparen",icon:"🧾",
  headline:"Legale Steuervorteile clever nutzen",
  sub:"Die wichtigsten Stellschrauben, mit denen Angestellte und Selbstständige bares Geld sparen.",
  benefits:["Legale Steuervorteile, die viele verschenken","Für Angestellte & Selbstständige","Die wichtigsten Stellschrauben im Überblick","Was du noch dieses Jahr angehen kannst"]},
 {key:"geldanlage",match:/geldanlage/i,label:"Geldanlage",icon:"📈",
  headline:"Vermögen sicher und smart aufbauen",
  sub:"Wie du dein Geld strukturiert anlegst, Risiken streust und langfristig dranbleibst – ohne Spekulation.",
  benefits:["Vermögen sicher und strukturiert aufbauen","Risiko streuen statt spekulieren","Welche Anlageklassen zu dir passen","Wie du langfristig dranbleibst"]},
];
function topicOf(title){ return TOPICS.find(t=>t.match.test(title||"")); }

let advisor=null, webs=[], selectedW="";
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function fmtDay(d){return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",timeZone:TZ});}
function fmtMon(d){return new Date(d).toLocaleDateString("de-DE",{month:"short",timeZone:TZ}).replace(".","");}
function fmtFull(d){const x=new Date(d);return x.toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",timeZone:TZ})+", "+x.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",timeZone:TZ})+" Uhr";}

async function init(){
  if(!slug){ $("view").innerHTML='<div class="msg err" style="display:block">Dieser Link ist unvollständig. Bitte nutze den persönlichen Link deines Beraters.</div>'; return; }
  const [{data:adv},{data:w}]=await Promise.all([sb.rpc("webinar_advisor_by_slug",{p_slug:slug}),sb.rpc("webinar_public_upcoming")]);
  advisor=adv&&adv[0]; webs=w||[];
  if(advisor){ $("invite").classList.remove("hidden"); $("invite").innerHTML='<div class="av">'+esc(advisor.name.split(" ").map(s=>s[0]).slice(0,2).join("").toUpperCase())+'</div><div>Du wurdest von <b>'+esc(advisor.name)+'</b> zu unseren kostenlosen Live-Workshops eingeladen.</div>'; }
  render();
}
function topicsWithDates(){
  const map={};
  webs.forEach(wb=>{ const t=topicOf(wb.title); if(!t) return; (map[t.key]=map[t.key]||[]).push(wb); });
  return TOPICS.filter(t=>map[t.key]).map(t=>({...t,dates:map[t.key].sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at))}));
}
function render(){
  const list=topicsWithDates();
  const sel=curTopic && list.find(t=>t.key===curTopic);
  if(sel) renderTopic(sel); else renderOverview(list);
}
function renderOverview(list){
  if(!list.length){ $("view").innerHTML='<h2 class="sec">Aktuell keine Termine</h2><p class="lead">Schau bald wieder vorbei – neue Live-Workshops sind in Planung.</p>'; return; }
  const cards=list.map(t=>{
    const next=t.dates[0];
    return '<a class="tcard" href="?b='+encodeURIComponent(slug)+'&t='+t.key+'">'+
      '<div class="ticon">'+t.icon+'</div>'+
      '<h3>'+esc(t.label)+'</h3><p>'+esc(t.sub)+'</p>'+
      '<div class="tnext">Nächster Termin: <span>'+fmtFull(next.starts_at)+'</span></div>'+
      '<div class="go">Ansehen &amp; anmelden →</div></a>';
  }).join("");
  $("view").innerHTML='<h2 class="sec">Unsere kostenlosen Live-Workshops</h2><p class="lead">Wähle dein Thema – kompakt, praxisnah und live mit unseren Experten.</p><div class="grid">'+cards+'</div>';
}
function renderTopic(t){
  const dates=t.dates.map(wb=>{
    const d=wb.starts_at;
    return '<div class="date" data-w="'+wb.webinar_id+'"><div class="dbox"><div class="d">'+fmtDay(d)+'</div><div class="m">'+fmtMon(d)+'</div></div>'+
      '<div class="dmeta"><b>'+fmtFull(d)+'</b><span>Online via Microsoft Teams</span></div><div class="radio"></div></div>';
  }).join("");
  const ben=t.benefits.map(b=>'<li>'+esc(b)+'</li>').join("");
  $("view").innerHTML=
    '<a class="back" href="?b='+encodeURIComponent(slug)+'">← Alle Themen</a>'+
    '<div class="hero"><div class="tag">'+t.icon+' '+esc(t.label)+'</div><h1>'+esc(t.headline)+'</h1><p>'+esc(t.sub)+'</p></div>'+
    '<div class="cols">'+
      '<div class="panel"><h3>Das nimmst du mit</h3><ul class="ben">'+ben+'</ul></div>'+
      '<div class="panel"><h3>Termin wählen &amp; anmelden</h3>'+
        '<div class="dates">'+dates+'</div>'+
        '<div class="frow"><div><label>Vorname</label><input id="vorname" autocomplete="given-name"></div><div><label>Nachname</label><input id="nachname" autocomplete="family-name"></div></div>'+
        '<label>E-Mail</label><input id="email" type="email" autocomplete="email">'+
        '<label class="consent"><input id="consent" type="checkbox"> <span>Ich bin mit der Verarbeitung meiner Daten zur Webinar-Anmeldung einverstanden (<a href="https://www.mitnorm.com/datenschutz" target="_blank" rel="noopener">Datenschutz</a>).</span></label>'+
        '<button id="submit">Kostenlos anmelden</button><div id="msg" class="msg"></div>'+
      '</div>'+
    '</div>';
  selectedW = t.dates.length===1 ? t.dates[0].webinar_id : "";
  document.querySelectorAll(".date").forEach(el=>{
    if(el.dataset.w===selectedW) el.classList.add("sel");
    el.onclick=()=>{ document.querySelectorAll(".date").forEach(x=>x.classList.remove("sel")); el.classList.add("sel"); selectedW=el.dataset.w; };
  });
  $("submit").onclick=submit;
}
async function submit(){
  const p={b:slug,w:selectedW,vorname:$("vorname").value.trim(),nachname:$("nachname").value.trim(),email:$("email").value.trim(),consent:$("consent").checked};
  const m=$("msg");
  if(!p.w){ m.className="msg err";m.style.display="block";m.textContent="Bitte wähle einen Termin aus.";return; }
  if(!p.vorname||!p.nachname||!p.email){ m.className="msg err";m.style.display="block";m.textContent="Bitte fülle alle Felder aus.";return; }
  if(!p.consent){ m.className="msg err";m.style.display="block";m.textContent="Bitte stimme der Datenverarbeitung zu.";return; }
  $("submit").disabled=true;$("submit").textContent="Wird angemeldet…";m.style.display="none";
  try{
    const {data,error}=await sb.functions.invoke("webinar-register",{body:p});
    if(error||!data||data.ok===false){ m.className="msg err";m.style.display="block";m.textContent=(data&&data.error)||"Anmeldung fehlgeschlagen. Bitte später erneut versuchen.";$("submit").disabled=false;$("submit").textContent="Kostenlos anmelden";return; }
    document.querySelector(".cols").innerHTML='<div class="panel" style="grid-column:1/-1;text-align:center;padding:40px;"><div style="font-size:46px;">✅</div><h3 style="font-size:22px;margin:10px 0 6px;">'+(data.already?"Du bist bereits angemeldet":"Anmeldung erfolgreich!")+'</h3><p style="color:var(--muted);margin:0;">Du erhältst die Zugangsdaten in Kürze per E-Mail von Microsoft Teams. Wir freuen uns auf dich!</p></div>';
  }catch(e){ m.className="msg err";m.style.display="block";m.textContent="Es ist ein Fehler aufgetreten. Bitte später erneut versuchen.";$("submit").disabled=false;$("submit").textContent="Kostenlos anmelden"; }
}
window.addEventListener("popstate",()=>{ curTopic=new URLSearchParams(location.search).get("t")||""; render(); });
init();
</script>
</body>
</html>
